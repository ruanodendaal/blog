{% comment %} Rich Person schema for search engines and AI answer engines {% endcomment %}
{% assign me = site.data.authors.ruan %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{ me.name }}",
  "url": "{{ site.url }}",
  "image": "{{ site.cdn }}{{ me.avatar }}",
  "email": "mailto:{{ me.email }}",
  "jobTitle": "Head of Product",
  "worksFor": { "@type": "Organization", "name": "Findable AI", "url": "https://www.findable.ai" },
  "address": { "@type": "PostalAddress", "addressLocality": "London", "addressCountry": "GB" },
  "alumniOf": { "@type": "CollegeOrUniversity", "name": "University of the West of England, Bristol" },
  "knowsAbout": ["AI product management", "Applied AI", "Generative AI", "Model Context Protocol (MCP)", "Claude Code", "Agentic AI", "LLM evaluation", "Product leadership", "Product-led growth", "AI strategy"],
  "sameAs": [
    "https://www.linkedin.com/in/{{ me.linkedin }}",
    "https://github.com/{{ me.github }}",
    "https://x.com/{{ me.twitter }}"
  ],
  "description": "{{ me.bio_short | strip_newlines | strip }}"
}
</script>
