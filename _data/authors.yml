  # Hero (homepage) — one or two punchy sentences.
  bio_short: >-
    AI-native product leader who ships code — and presents to the board. 15 years
    in B2B SaaS across VC-backed startups and £1B+ enterprises, owning product,
    design and the commercial motion end to end. Currently Head of Product at
    Findable AI.

  # /about page — markdown supported.
  bio_long: |
    I'm an AI-native product leader who ships code. Over 15 years — mostly in
    B2B SaaS — I've built AI and platform products across VC-backed startups and
    £1B+ enterprises, moving deliberately between leadership and hands-on IC, from
    leading a 70-person organisation back to being a builder and forward again.
    Engineer by training, operator by trade.

    These days I operate with the scope of a VP or Director of Product — and
    increasingly a Chief Product Officer's remit. At Findable AI I own product,
    design, go-to-market (sales and marketing collateral), pricing and packaging,
    company and product strategy, and the unit economics of the business — and I
    present to the board in every meeting. I led the strategy rewrite that put the
    company on a net-expansion path.

    I'm all-in on applied AI and build on the Anthropic stack rather than just
    using it: a custom MCP server, Claude agents I run daily, internal Claude
    skills my team relies on, and production code shipped via Cursor and Claude
    Code, with evals to keep model behaviour honest.

    I've reported to the board across four VC-backed companies, co-led Series B
    due diligence, and ran six-weekly C-suite reviews on a £400M subscription
    business at News UK. I've spent most of my career alongside founders — as at
    home in an architecture conversation as a board one.

    I'm based in London and work in London or fully remote. If you're solving hard
    problems with frontier AI, I'm always open to a good conversation.

