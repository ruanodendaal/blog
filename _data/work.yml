# Products & work — a visual showcase on /work/ and (featured: true) on the homepage.
# The full career history lives in _data/experience.yml (shown on /about/).
#
# Fields:
#   name, company, role, period, summary
#   links     [{label, url}]   — first link is the card's primary target
#   image     cover image, or a logo/mark (with image_fit: contain)
#   image_fit "cover" (default) | "contain"
#   bg        background behind a contain logo, or a gradient when there's no image
#   brands    [{src, alt} or {label}]  — a strip of brand logos (overrides image)
#   media_dark true → dark background for the media zone (good for mixed-colour logos)
#   featured  true → shown on the homepage

